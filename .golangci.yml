version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - dogsled
    - dupl
    - errcheck
    - errorlint
    - exhaustive
    - funlen
    - goconst
    - gocritic
    - gocyclo
    - godot
    - govet
    - ineffassign
    - misspell
    - noctx
    - nolintlint
    - prealloc
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - testifylint
    - unconvert
    - unparam
    - unused
    - whitespace
    - wrapcheck

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  funlen:
    lines: 80
    statements: 50
  gocyclo:
    min-complexity: 15
  goconst:
    min-len: 3
    min-occurrences: 3
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"
  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - .Wrap(
      - .WithMessage(

issues:
  exclude-rules:
    # Allow longer test files
    - path: _test\.go
      linters:
        - funlen
        - dupl
        - goconst
    # Allow generated code
    - path: db/sqlc/
      linters:
        - all
  max-issues-per-linter: 0
  max-same-issues: 0
