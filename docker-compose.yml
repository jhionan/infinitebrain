version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: infinitebrain_postgres
    environment:
      POSTGRES_USER: infinitebrain
      POSTGRES_PASSWORD: infinitebrain
      POSTGRES_DB: infinitebrain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infinitebrain"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:9-alpine
    container_name: infinitebrain_valkey
    command: valkey-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: infinitebrain_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  openbao:
    image: openbao/openbao:latest
    container_name: infinitebrain_openbao
    command: server -dev -dev-root-token-id="dev-root-token"
    environment:
      BAO_DEV_ROOT_TOKEN_ID: dev-root-token
      BAO_LOG_LEVEL: warn
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "bao", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Jaeger for distributed tracing (dev only)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: infinitebrain_jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16687:16686"   # Jaeger UI
      - "4319:4317"     # OTLP gRPC
      - "4320:4318"     # OTLP HTTP
    profiles:
      - observability

volumes:
  postgres_data:
  valkey_data:
  minio_data:
